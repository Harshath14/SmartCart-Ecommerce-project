{% extends "base.html" %}

{% block title %}User Login - SmartCart{% endblock %}

{% block extra_css %}
<style>
    .login-container{
        width:380px;
        margin:60px auto;
        background:white;
        padding:35px;
        border-radius:10px;
        box-shadow:0 5px 15px rgba(0,0,0,.15);
    }

    .login-container h2{
        text-align:center;
        margin-bottom:25px;
    }

    .login-container label{
        display:block;
        margin-bottom:6px;
        font-weight:bold;
    }

    .login-container input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:6px;
        margin-bottom:18px;
        font-size:15px;
    }

    .login-container input:focus{
        outline:none;
        border-color:#ff9900;
        box-shadow:0 0 5px rgba(255,153,0,.4);
    }

    .login-container button{
        width:100%;
        padding:13px;
        border:none;
        border-radius:25px;
        background:#ffd814;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
    }

    .login-container button:hover{
        background:#f7ca00;
    }

    .register{
        text-align:center;
        margin-top:20px;
    }

    .register a{
        color:#007185;
        text-decoration:none;
        font-weight:bold;
    }

    .register a:hover{
        text-decoration:underline;
    }

    @media(max-width:450px){
        .login-container{
            width:90%;
            margin-top:40px;
        }
    }
</style>
{% endblock %}

{% block content %}

<div class="login-container">

    <h2>User Login</h2>

    <form method="POST" action="/user-login">

        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>

    </form>

    <div class="register">
        Don't have an account?
        <br><br>
        <a href="/user-register">Create Account</a>
    </div>

</div>

{% endblock %}
