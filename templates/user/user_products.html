{% extends "base.html" %}

{% block title %}All Products - SmartCart{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/user_products.css') }}">
{% endblock %}

{% block content %}

<div class="products-page">

    <h2>All Products</h2>

    <!-- Search + Filter (single form so both work together) -->
    <div class="filters">
        <form method="GET" action="/user/products" style="display:flex; gap:20px; flex-wrap:wrap;">

            <input type="text"
                   name="search"
                   placeholder="Search products..."
                   value="{{ request.args.get('search','') }}">

            <select name="category">
                <option value="">All Categories</option>
                {% for cat in categories %}
                <option value="{{ cat.category }}"
                    {% if request.args.get('category') == cat.category %}selected{% endif %}>
                    {{ cat.category }}
                </option>
                {% endfor %}
            </select>

            <button type="submit">Search / Filter</button>
        </form>
    </div>

    <!-- Products -->
    <div class="product-container">

        {% for product in products %}
        <div class="product-card">

            <img src="/static/uploads/product_images/{{ product.image }}" alt="{{ product.name }}">

            <h3>{{ product.name }}</h3>

            <p class="category">{{ product.category }}</p>

            <h2 class="price">₹{{ product.price }}</h2>

            <form action="/user/add-to-cart/{{ product.product_id }}" method="GET">
                <button class="cart-btn">Add to Cart</button>
            </form>

            <a class="details-btn" href="/user/product/{{ product.product_id }}">
                View Details
            </a>

            <a class="buy-btn" href="/user/address?product_id={{ product.product_id }}">
                Buy Now
            </a>

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
