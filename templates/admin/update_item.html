{% extends "admin/admin_base.html" %}

{% block title %}Update Product - SmartCart Admin{% endblock %}

{% block extra_css %}
<style>
    .ad-form-container{
        width:500px;
        max-width:92%;
        margin:40px auto;
        background:#fff;
        padding:35px;
        border-radius:12px;
        box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .ad-form-container h2{
        text-align:center;
        color:#232f3e;
        margin-bottom:25px;
    }

    .ad-form-container label{
        display:block;
        margin-bottom:6px;
        font-weight:bold;
        color:#333;
    }

    .ad-form-container input,
    .ad-form-container textarea{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:6px;
        font-size:15px;
        margin-bottom:18px;
        font-family:inherit;
    }

    .ad-form-container img{
        border-radius:6px;
        margin-bottom:15px;
    }

    .ad-form-container button{
        width:100%;
        padding:12px;
        background:#ff9900;
        color:#fff;
        border:none;
        border-radius:6px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
    }

    .ad-form-container button:hover{
        background:#e68a00;
    }

    .ad-back-link{
        display:block;
        text-align:center;
        margin-top:18px;
        color:#007185;
        text-decoration:none;
        font-weight:bold;
    }

    .ad-back-link:hover{
        text-decoration:underline;
    }
</style>
{% endblock %}

{% block content %}

<div class="ad-form-container">

    <h2>Update Product</h2>

    <form method="POST" action="/admin/update-item/{{ product.product_id }}" enctype="multipart/form-data">

        <label>Product Name</label>
        <input type="text" name="name" value="{{ product.name }}" required>

        <label>Description</label>
        <textarea name="description" rows="4" required>{{ product.description }}</textarea>

        <label>Category</label>
        <input type="text" name="category" value="{{ product.category }}" required>

        <label>Price</label>
        <input type="number" step="0.01" name="price" value="{{ product.price }}" required>

        <label>Current Image</label>
        <img src="/static/uploads/product_images/{{ product.image }}" width="120">

        <label>Choose New Image (Optional)</label>
        <input type="file" name="image" accept="image/*">

        <button type="submit">Update Product</button>
    </form>

    <a href="/admin/item-list" class="ad-back-link">← Back to Product List</a>

</div>

{% endblock %}
