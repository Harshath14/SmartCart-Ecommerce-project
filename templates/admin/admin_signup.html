{% extends "admin/admin_base.html" %}

{% block title %}Admin Registration - SmartCart{% endblock %}

{% block extra_css %}
<style>
    .ad-form-container{
        width:400px;
        max-width:92%;
        margin:60px auto;
        background:#fff;
        padding:35px;
        border-radius:12px;
        box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .ad-form-container h2{
        text-align:center;
        color:#232f3e;
        margin-bottom:25px;
    }

    .ad-form-container label{
        display:block;
        margin-bottom:6px;
        font-weight:bold;
        color:#333;
    }

    .ad-form-container input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:6px;
        font-size:15px;
        margin-bottom:20px;
        outline:none;
        transition:0.3s;
    }

    .ad-form-container input:focus{
        border-color:#ff9900;
        box-shadow:0 0 5px rgba(255,153,0,0.5);
    }

    .ad-form-container button{
        width:100%;
        padding:12px;
        background:#ff9900;
        color:white;
        border:none;
        border-radius:6px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    .ad-form-container button:hover{
        background:#e68a00;
    }

    .ad-form-container .switch-link{
        text-align:center;
        margin-top:20px;
    }

    .ad-form-container .switch-link a{
        color:#0073bb;
        text-decoration:none;
        font-weight:bold;
    }

    .ad-form-container .switch-link a:hover{
        text-decoration:underline;
    }
</style>
{% endblock %}

{% block content %}

<div class="ad-form-container">

    <h2>Admin Registration</h2>

    <form method="POST" action="/admin-signup">

        <label>Name</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <button type="submit">Send OTP</button>

    </form>

    <div class="switch-link">
        Already have an account?
        <a href="/admin-login">Login</a>
    </div>

</div>

{% endblock %}
