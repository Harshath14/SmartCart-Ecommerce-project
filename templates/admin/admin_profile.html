{% extends "admin/admin_base.html" %}

{% block title %}Admin Profile - SmartCart{% endblock %}

{% block extra_css %}
<style>
    .ap-container{
        max-width:650px;
        margin:30px auto;
        background:#fff;
        border-radius:12px;
        box-shadow:0 5px 15px rgba(0,0,0,0.15);
        padding:35px;
    }

    .ap-container h2{
        text-align:center;
        color:#232f3e;
        margin-bottom:25px;
    }

    .ap-profile-img{
        display:flex;
        justify-content:center;
        margin-bottom:25px;
    }

    .ap-profile-img img{
        width:130px;
        height:130px;
        border-radius:50%;
        object-fit:cover;
        border:4px solid #ff9900;
    }

    .ap-no-image{
        text-align:center;
        color:#777;
        margin-bottom:20px;
    }

    .ap-container label{
        display:block;
        font-weight:bold;
        color:#333;
        margin-bottom:8px;
    }

    .ap-container input[type="text"],
    .ap-container input[type="email"],
    .ap-container input[type="password"],
    .ap-container input[type="file"]{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:6px;
        margin-bottom:20px;
        font-size:15px;
    }

    .ap-container input:focus{
        outline:none;
        border-color:#ff9900;
        box-shadow:0 0 5px rgba(255,153,0,.5);
    }

    .ap-container button{
        width:100%;
        padding:14px;
        background:#ff9900;
        color:#fff;
        border:none;
        border-radius:6px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:.3s;
    }

    .ap-container button:hover{
        background:#e68a00;
    }

    .ap-back{
        display:block;
        text-align:center;
        margin-top:20px;
        color:#007185;
        text-decoration:none;
        font-weight:bold;
    }

    .ap-back:hover{
        text-decoration:underline;
    }
</style>
{% endblock %}

{% block content %}

<div class="ap-container">

    <h2>Admin Profile</h2>

    {% if admin.profile_image %}
        <div class="ap-profile-img">
            <img src="/static/uploads/admin_profiles/{{ admin.profile_image }}" alt="Profile Image">
        </div>
    {% else %}
        <p class="ap-no-image">No Profile Image Available</p>
    {% endif %}

    <form method="POST" action="/admin/profile" enctype="multipart/form-data">

        <label>Name</label>
        <input type="text" name="name" value="{{ admin.name }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ admin.email }}" required>

        <label>New Password (Optional)</label>
        <input type="password" name="password" placeholder="Enter new password">

        <label>Upload New Profile Image (Optional)</label>
        <input type="file" name="profile_image" accept="image/*">

        <button type="submit">Update Profile</button>

    </form>

    <a href="/admin-dashboard" class="ap-back">← Back to Dashboard</a>

</div>

{% endblock %}
